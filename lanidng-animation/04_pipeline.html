<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucy · 04 Pipeline</title>
<style>
:root{
  --teal:#00d3bb;
  --teal-soft:rgba(0,211,187,.35);
  --teal-glow:rgba(0,211,187,.18);
  --indigo:#605dff;
  --indigo-soft:rgba(96,93,255,.35);
  --indigo-glow:rgba(96,93,255,.18);
  --bg:#0a0b14;
  --ink:#eaeaf2;
  --dim:#8a8ba0;
  --line:rgba(255,255,255,.07);
  --line2:rgba(255,255,255,.13);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:'SF Pro Display','Inter',system-ui,sans-serif;overflow:hidden}
body{
  background:
    radial-gradient(60% 50% at 20% 30%, var(--teal-glow), transparent 60%),
    radial-gradient(40% 40% at 80% 20%, var(--indigo-glow), transparent 60%),
    radial-gradient(50% 50% at 70% 90%, rgba(96,93,255,.10), transparent 60%),
    var(--bg);
  display:grid;place-items:center;
}
.stage{
  position:relative;
  width:min(1100px,96vw);
  aspect-ratio:16/10;
  border-radius:20px;
  overflow:hidden;
  background:linear-gradient(180deg,#0e0f1c,#08090f);
  box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 0 0 1px var(--line);
}
.grain{position:absolute;inset:0;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");}
.glow{position:absolute;inset:-20%;pointer-events:none;background:
  radial-gradient(40% 35% at 15% 30%, var(--teal-glow), transparent 60%),
  radial-gradient(35% 35% at 85% 25%, var(--indigo-glow), transparent 60%);
  filter:blur(20px);animation:drift 12s ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(2%,-2%)}}

.canvas{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 8%}

.track{position:relative;display:flex;justify-content:space-between;align-items:center;margin-bottom:60px}
.stage-node{position:relative;z-index:2;width:90px;text-align:center}
.stage-node .circle{width:50px;height:50px;margin:0 auto 10px;border-radius:50%;border:1px solid var(--line2);background:rgba(20,21,32,.8);display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--dim);position:relative;transition:all .4s}
.stage-node .circle::before{content:"";position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--teal-soft);opacity:0;animation:nodeRing 7s infinite}
.stage-node.n1 .circle::before{animation-delay:.5s}
.stage-node.n2 .circle::before{animation-delay:2s}
.stage-node.n3 .circle::before{animation-delay:3.5s}
.stage-node.n4 .circle::before{animation-delay:5s}
@keyframes nodeRing{0%,3%{opacity:0;transform:scale(.8)}5%,15%{opacity:.8;transform:scale(1)}20%{opacity:0;transform:scale(1.3)}25%,100%{opacity:0}}
.stage-node.n1 .circle{animation:nodeOn 7s infinite;animation-delay:.5s}
.stage-node.n2 .circle{animation:nodeOn 7s infinite;animation-delay:2s}
.stage-node.n3 .circle{animation:nodeOn 7s infinite;animation-delay:3.5s}
.stage-node.n4 .circle{animation:nodeOn 7s infinite;animation-delay:5s}
@keyframes nodeOn{0%,3%{border-color:var(--line2);color:var(--dim);background:rgba(20,21,32,.8)}5%,18%{border-color:var(--teal);color:var(--teal);background:rgba(0,211,187,.1);box-shadow:0 0 30px var(--teal-glow)}25%,100%{border-color:var(--teal-soft);color:var(--teal);background:rgba(20,21,32,.8);box-shadow:none}}
.stage-node .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:var(--dim)}
.stage-node .sub{font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-top:3px;opacity:.6}

.rail{position:absolute;left:80px;right:80px;top:25px;height:1px;background:var(--line2);z-index:1}
.rail::after{content:"";position:absolute;left:0;top:-1px;height:3px;width:0;background:linear-gradient(90deg,var(--teal),var(--indigo));box-shadow:0 0 12px var(--teal);border-radius:3px;animation:railFill 7s infinite}
@keyframes railFill{0%{width:0}10%{width:33%}30%{width:33%}40%{width:66%}60%{width:66%}70%{width:100%}100%{width:100%}}

.leads{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;max-width:680px;margin:0 auto}
.leadchip{padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:rgba(20,21,32,.6);font-size:11px;display:flex;align-items:center;gap:8px;backdrop-filter:blur(10px)}
.leadchip .av{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,rgba(0,211,187,.3),rgba(96,93,255,.1));display:grid;place-items:center;font-size:9px;color:var(--teal);font-family:'Fraunces',serif}
.leadchip .nm{font-size:11px}
.leadchip .st{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-left:4px}
.leadchip.active{animation:chipActive 7s infinite}
.leadchip.l1{animation-delay:.5s}
.leadchip.l2{animation-delay:1.8s}
.leadchip.l3{animation-delay:3.2s}
@keyframes chipActive{0%,3%{border-color:var(--line);background:rgba(20,21,32,.6);box-shadow:none;transform:scale(1)}5%,18%{border-color:var(--teal);background:rgba(0,211,187,.08);box-shadow:0 0 20px var(--teal-glow);transform:scale(1.05)}25%,100%{border-color:var(--teal-soft);background:rgba(20,21,32,.6);box-shadow:none;transform:scale(1)}}

.stage-marker{position:absolute;top:24px;left:30px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:2.5px;z-index:60}
.stage-marker b{color:var(--teal);font-weight:500}
.marker{position:absolute;top:24px;right:30px;font-family:'Fraunces',serif;font-size:11px;color:var(--teal);letter-spacing:1px;z-index:55;text-transform:uppercase}
</style>
</head>
<body>
<div class="stage">
  <div class="glow"></div>
  <div class="grain"></div>
  <div class="stage-marker">Lucy <b>·</b> 04</div>
  <span class="marker">04 / pipeline</span>

  <div class="canvas">
    <div class="track">
      <div class="rail"></div>
      <div class="stage-node n1"><div class="circle">01</div><div class="lbl">New</div><div class="sub">4 leads</div></div>
      <div class="stage-node n2"><div class="circle">02</div><div class="lbl">Contacted</div><div class="sub">3 leads</div></div>
      <div class="stage-node n3"><div class="circle">03</div><div class="lbl">Qualified</div><div class="sub">3 leads</div></div>
      <div class="stage-node n4"><div class="circle">04</div><div class="lbl">Won</div><div class="sub">2 closed</div></div>
    </div>

    <div class="leads">
      <div class="leadchip active l1"><span class="av">J</span><span class="nm">Jamie Reyes</span><span class="st">→ contacted</span></div>
      <div class="leadchip active l2"><span class="av">M</span><span class="nm">Marcus Kim</span><span class="st">→ qualified</span></div>
      <div class="leadchip active l3"><span class="av">T</span><span class="nm">Talia Ng</span><span class="st">→ won</span></div>
    </div>
  </div>
</div>
</body>
</html>
