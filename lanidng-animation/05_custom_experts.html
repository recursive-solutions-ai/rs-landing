<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucy · 05 Custom Experts</title>
<style>
:root{
  --teal:#00d3bb;
  --teal-soft:rgba(0,211,187,.35);
  --teal-glow:rgba(0,211,187,.18);
  --indigo:#605dff;
  --indigo-soft:rgba(96,93,255,.35);
  --indigo-glow:rgba(96,93,255,.18);
  --bg:#0a0b14;
  --ink:#eaeaf2;
  --dim:#8a8ba0;
  --line:rgba(255,255,255,.07);
  --line2:rgba(255,255,255,.13);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:'SF Pro Display','Inter',system-ui,sans-serif;overflow:hidden}
body{
  background:
    radial-gradient(60% 50% at 20% 30%, var(--teal-glow), transparent 60%),
    radial-gradient(40% 40% at 80% 20%, var(--indigo-glow), transparent 60%),
    radial-gradient(50% 50% at 70% 90%, rgba(96,93,255,.10), transparent 60%),
    var(--bg);
  display:grid;place-items:center;
}
.stage{
  position:relative;
  width:min(1100px,96vw);
  aspect-ratio:16/10;
  border-radius:20px;
  overflow:hidden;
  background:linear-gradient(180deg,#0e0f1c,#08090f);
  box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 0 0 1px var(--line);
}
.grain{position:absolute;inset:0;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");}
.glow{position:absolute;inset:-20%;pointer-events:none;background:
  radial-gradient(40% 35% at 15% 30%, var(--teal-glow), transparent 60%),
  radial-gradient(35% 35% at 85% 25%, var(--indigo-glow), transparent 60%);
  filter:blur(20px);animation:drift 12s ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(2%,-2%)}}

.canvas{position:absolute;inset:0}

.lucy-core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,211,187,.35),rgba(96,93,255,.08) 60%,transparent 70%);
  display:grid;place-items:center;z-index:5}
.lucy-core::after{content:"";position:absolute;inset:18px;border-radius:50%;background:radial-gradient(circle,var(--teal),transparent 70%);filter:blur(6px);animation:corePulse 2.2s ease-in-out infinite}
@keyframes corePulse{0%,100%{transform:scale(.9);opacity:.7}50%{transform:scale(1.1);opacity:1}}
.lucy-core .lbl{position:relative;z-index:2;font-family:'Fraunces',serif;font-size:13px}

.orbit{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:440px;height:440px;border-radius:50%;border:1px dashed var(--line2);opacity:.4}
.orbit2{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:300px;height:300px;border-radius:50%;border:1px solid var(--teal-soft);opacity:0;animation:orbitPulse 3s ease-in-out infinite}
@keyframes orbitPulse{0%,100%{opacity:0;transform:translate(-50%,-50%) scale(.9)}50%{opacity:.6;transform:translate(-50%,-50%) scale(1)}}

.agent{position:absolute;width:130px;border:1px solid var(--line2);border-radius:14px;background:rgba(20,21,32,.85);backdrop-filter:blur(20px);padding:12px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.agent .av{width:36px;height:36px;border-radius:10px;margin:0 auto 8px;display:grid;place-items:center;font-family:'Fraunces',serif;font-size:16px;background:linear-gradient(135deg,rgba(0,211,187,.2),rgba(96,93,255,.1));border:1px solid var(--teal-soft);color:var(--teal)}
.agent .nm{font-family:'Fraunces',serif;font-size:13px}
.agent .rl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-top:3px}

.agent.top{top:14%;left:50%;transform:translateX(-50%)}
.agent.right{top:50%;right:14%;transform:translateY(-50%)}
.agent.bottom{bottom:14%;left:50%;transform:translateX(-50%)}
.agent.left{top:50%;left:14%;transform:translateY(-50%)}

.agent.top{animation:agentActive 7s infinite;animation-delay:.4s}
.agent.right{animation:agentActive 7s infinite;animation-delay:2s}
.agent.bottom{animation:agentActive 7s infinite;animation-delay:3.6s}
.agent.left{animation:agentActive 7s infinite;animation-delay:5.2s}
@keyframes agentActive{
  0%,3%{border-color:var(--line2);box-shadow:0 12px 40px rgba(0,0,0,.6)}
  5%,18%{border-color:var(--teal);box-shadow:0 0 40px var(--teal-glow), 0 12px 40px rgba(0,0,0,.6)}
  25%,100%{border-color:var(--line2);box-shadow:0 12px 40px rgba(0,0,0,.6)}
}

.agent .ping{position:absolute;top:8px;right:8px;width:6px;height:6px;border-radius:50%;background:var(--dim)}
.agent.top .ping{animation:pingOn 7s infinite;animation-delay:.4s}
.agent.right .ping{animation:pingOn 7s infinite;animation-delay:2s}
.agent.bottom .ping{animation:pingOn 7s infinite;animation-delay:3.6s}
.agent.left .ping{animation:pingOn 7s infinite;animation-delay:5.2s}
@keyframes pingOn{0%,3%{background:var(--dim);box-shadow:none}5%,18%{background:var(--teal);box-shadow:0 0 10px var(--teal)}25%,100%{background:var(--dim);box-shadow:none}}

svg.beams{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
svg.beams line{stroke:var(--teal);stroke-width:1.5;opacity:0;stroke-dasharray:3 6}
svg.beams line.b-top{animation:beam 7s infinite;animation-delay:.4s}
svg.beams line.b-right{animation:beam 7s infinite;animation-delay:2s}
svg.beams line.b-bottom{animation:beam 7s infinite;animation-delay:3.6s}
svg.beams line.b-left{animation:beam 7s infinite;animation-delay:5.2s}
@keyframes beam{0%,3%{opacity:0}5%,18%{opacity:.8;stroke-dashoffset:-30}25%,100%{opacity:0}}

.stage-marker{position:absolute;top:24px;left:30px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:2.5px;z-index:60}
.stage-marker b{color:var(--teal);font-weight:500}
.marker{position:absolute;top:24px;right:30px;font-family:'Fraunces',serif;font-size:11px;color:var(--teal);letter-spacing:1px;z-index:55;text-transform:uppercase}
</style>
</head>
<body>
<div class="stage">
  <div class="glow"></div>
  <div class="grain"></div>
  <div class="stage-marker">Lucy <b>·</b> 05</div>
  <span class="marker">05 / custom experts</span>

  <div class="canvas">
    <svg class="beams" viewBox="0 0 1100 700" preserveAspectRatio="none">
      <line class="b-top" x1="550" y1="350" x2="550" y2="160"/>
      <line class="b-right" x1="550" y1="350" x2="930" y2="350"/>
      <line class="b-bottom" x1="550" y1="350" x2="550" y2="560"/>
      <line class="b-left" x1="550" y1="350" x2="170" y2="350"/>
    </svg>

    <div class="orbit"></div>
    <div class="orbit2"></div>

    <div class="lucy-core">
      <div class="lbl">Lucy</div>
    </div>

    <div class="agent top"><div class="ping"></div><div class="av">N</div><div class="nm">Nancy</div><div class="rl">marketing</div></div>
    <div class="agent right"><div class="ping"></div><div class="av">S</div><div class="nm">Sam</div><div class="rl">support</div></div>
    <div class="agent bottom"><div class="ping"></div><div class="av">F</div><div class="nm">Fran</div><div class="rl">finance</div></div>
    <div class="agent left"><div class="ping"></div><div class="av">O</div><div class="nm">Otto</div><div class="rl">onboarding</div></div>
  </div>
</div>
</body>
</html>
