<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucy · 02 Content Engine</title>
<style>
:root{
  --teal:#00d3bb;
  --teal-soft:rgba(0,211,187,.35);
  --teal-glow:rgba(0,211,187,.18);
  --indigo:#605dff;
  --indigo-soft:rgba(96,93,255,.35);
  --indigo-glow:rgba(96,93,255,.18);
  --bg:#0a0b14;
  --ink:#eaeaf2;
  --dim:#8a8ba0;
  --line:rgba(255,255,255,.07);
  --line2:rgba(255,255,255,.13);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:'SF Pro Display','Inter',system-ui,sans-serif;overflow:hidden}
body{
  background:
    radial-gradient(60% 50% at 20% 30%, var(--teal-glow), transparent 60%),
    radial-gradient(40% 40% at 80% 20%, var(--indigo-glow), transparent 60%),
    radial-gradient(50% 50% at 70% 90%, rgba(96,93,255,.10), transparent 60%),
    var(--bg);
  display:grid;place-items:center;padding:2vw;
}
.stage{
  position:relative;
  width:100%;
  max-width:1100px;
  aspect-ratio:16/10;
  border-radius:clamp(10px,1.5vw,20px);
  overflow:hidden;
  background:linear-gradient(180deg,#0e0f1c,#08090f);
  box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 0 0 1px var(--line);
  container-type:inline-size;
}
.grain{position:absolute;inset:0;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");}
.glow{position:absolute;inset:-20%;pointer-events:none;background:
  radial-gradient(40% 35% at 15% 30%, var(--teal-glow), transparent 60%),
  radial-gradient(35% 35% at 85% 25%, var(--indigo-glow), transparent 60%);
  filter:blur(20px);animation:drift 12s ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(2%,-2%)}}

.canvas{position:absolute;inset:0}

/* central voice core */
.core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:14cqw;height:14cqw;border-radius:50%;
  background:radial-gradient(circle,rgba(0,211,187,.35),rgba(96,93,255,.08) 60%,transparent 70%);
  display:grid;place-items:center}
.core::after{content:"";position:absolute;inset:18%;border-radius:50%;
  background:radial-gradient(circle,var(--teal),transparent 70%);
  filter:blur(1cqw);animation:corePulse 2.2s ease-in-out infinite}
@keyframes corePulse{0%,100%{transform:scale(.9);opacity:.7}50%{transform:scale(1.1);opacity:1}}
.core .label{position:relative;z-index:2;font-family:'Fraunces',serif;font-size:1.8cqw;letter-spacing:.5px;text-align:center;line-height:1.2}
.core .label small{display:block;font-family:'JetBrains Mono',monospace;font-size:1cqw;color:var(--teal);text-transform:uppercase;letter-spacing:2px;margin-top:.4cqw}

.ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  border:1px solid var(--teal-soft);border-radius:50%;animation:expand 3s ease-out infinite}
.ring.r1{animation-delay:0s}
.ring.r2{animation-delay:1s}
.ring.r3{animation-delay:2s}
@keyframes expand{0%{width:14cqw;height:14cqw;opacity:.6}100%{width:60cqw;height:60cqw;opacity:0}}

/* post cards */
.post{position:absolute;border:1px solid var(--line2);border-radius:1cqw;
  background:rgba(20,21,32,.85);backdrop-filter:blur(20px);
  padding:1.3cqw 1.5cqw;width:23cqw;opacity:0;
  box-shadow:0 8px 30px rgba(0,0,0,.5), 0 0 20px var(--teal-glow)}
.post .head{display:flex;align-items:center;gap:.8cqw;margin-bottom:.7cqw}
.post .logo{width:2cqw;height:2cqw;border-radius:.4cqw;display:grid;place-items:center;background:rgba(255,255,255,.06);border:1px solid var(--line2);flex-shrink:0}
.post .logo svg{width:1.3cqw;height:1.3cqw;fill:var(--ink)}
.post .type{font-size:1.1cqw;color:var(--teal);text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
.post .t{font-family:'Fraunces',serif;font-size:1.7cqw;line-height:1.25}

.p1{top:14%;left:9%;animation:emit 7s infinite;animation-delay:.6s}
.p2{top:12%;right:9%;animation:emit 7s infinite;animation-delay:1.4s}
.p3{bottom:16%;left:8%;animation:emit 7s infinite;animation-delay:2.2s}
.p4{bottom:14%;right:8%;animation:emit 7s infinite;animation-delay:3s}
.p5{top:50%;left:2%;transform:translateY(-50%);animation:emitL 7s infinite;animation-delay:3.8s}
.p6{top:50%;right:2%;transform:translateY(-50%);animation:emitR 7s infinite;animation-delay:4.6s}
@keyframes emit{
  0%{opacity:0;transform:scale(.4)}
  8%{opacity:0;transform:scale(.4)}
  18%{opacity:1;transform:scale(1)}
  70%{opacity:1;transform:scale(1)}
  85%,100%{opacity:0;transform:scale(1)}
}
@keyframes emitL{0%{opacity:0;transform:translateY(-50%) scale(.4)}18%{opacity:1;transform:translateY(-50%) scale(1)}70%{opacity:1;transform:translateY(-50%) scale(1)}100%{opacity:0;transform:translateY(-50%) scale(1)}}
@keyframes emitR{0%{opacity:0;transform:translateY(-50%) scale(.4)}18%{opacity:1;transform:translateY(-50%) scale(1)}70%{opacity:1;transform:translateY(-50%) scale(1)}100%{opacity:0;transform:translateY(-50%) scale(1)}}

svg.lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
svg.lines path{stroke:var(--teal-soft);stroke-width:1;fill:none;stroke-dasharray:4 4;opacity:.3;animation:dash 3s linear infinite}
@keyframes dash{to{stroke-dashoffset:-16}}

.stage-marker{position:absolute;top:2.4cqw;left:3cqw;
  font-family:'JetBrains Mono',monospace;font-size:1cqw;color:var(--dim);
  text-transform:uppercase;letter-spacing:2.5px;z-index:60}
.stage-marker b{color:var(--teal);font-weight:500}
.marker{position:absolute;top:2.4cqw;right:3cqw;font-family:'Fraunces',serif;
  font-size:1.2cqw;color:var(--teal);letter-spacing:1px;z-index:55;text-transform:uppercase}
</style>
</head>
<body>
<div class="stage">
  <div class="glow"></div>
  <div class="grain"></div>
  <div class="stage-marker">Lucy <b>·</b> 02</div>
  <span class="marker">02 / content engine</span>

  <div class="canvas">
    <svg class="lines" viewBox="0 0 1100 700" preserveAspectRatio="none">
      <path d="M 550 350 L 200 200"/>
      <path d="M 550 350 L 900 180"/>
      <path d="M 550 350 L 180 540"/>
      <path d="M 550 350 L 920 530"/>
      <path d="M 550 350 L 100 350"/>
      <path d="M 550 350 L 1000 350"/>
    </svg>
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="core">

    <!-- LinkedIn -->

        <div class="type">LinkedIn</div>
      </div>
      <div class="t">Augmentation &gt; replacement</div>
    </div>

    <!-- Blog -->
    <div class="post p2">
      <div class="head">
        <div class="logo"><svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zM7 7h10v2H7V7zm0 4h10v2H7v-2zm0 4h7v2H7v-2z"/></svg></div>
        <div class="type">Blog</div>
      </div>
      <div class="t">The Five-Hour AI Audit</div>
    </div>

    <!-- X -->
    <div class="post p3">
      <div class="head">
        <div class="logo"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div>
        <div class="type">X</div>
      </div>
      <div class="t">Hour 5: plug one leak first</div>
    </div>

    <!-- Instagram -->
    <div class="post p4">
      <div class="head">
        <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2.16c3.2 0 3.58 0 4.85.07 1.17.05 1.8.25 2.23.42.56.21.96.47 1.38.89.42.42.68.82.89 1.38.17.42.36 1.06.42 2.23.06 1.27.07 1.65.07 4.85s0 3.58-.07 4.85c-.05 1.17-.25 1.8-.42 2.23-.21.56-.47.96-.89 1.38-.42.42-.82.68-1.38.89-.42.17-1.06.36-2.23.42-1.27.06-1.65.07-4.85.07s-3.58 0-4.85-.07c-1.17-.05-1.8-.25-2.23-.42a3.7 3.7 0 01-1.38-.89 3.7 3.7 0 01-.89-1.38c-.17-.42-.36-1.06-.42-2.23-.06-1.27-.07-1.65-.07-4.85s0-3.58.07-4.85c.05-1.17.25-1.8.42-2.23.21-.56.47-.96.89-1.38.42-.42.82-.68 1.38-.89.42-.17 1.06-.36 2.23-.42C8.42 2.17 8.8 2.16 12 2.16M12 0C8.74 0 8.33 0 7.05.07 5.78.13 4.9.33 4.14.63a5.86 5.86 0 00-2.12 1.38A5.86 5.86 0 00.63 4.14C.33 4.9.13 5.78.07 7.05.01 8.33 0 8.74 0 12s0 3.67.07 4.95c.06 1.27.26 2.14.56 2.91a5.86 5.86 0 001.38 2.12 5.86 5.86 0 002.12 1.38c.77.3 1.65.5 2.91.56C8.33 24 8.74 24 12 24s3.67 0 4.95-.07c1.27-.06 2.14-.26 2.91-.56a5.86 5.86 0 002.12-1.38 5.86 5.86 0 001.38-2.12c.3-.77.5-1.65.56-2.91.06-1.28.07-1.69.07-4.95s0-3.67-.07-4.95c-.06-1.27-.26-2.14-.56-2.91a5.86 5.86 0 00-1.38-2.12A5.86 5.86 0 0019.86.63C19.1.33 18.22.13 16.95.07 15.67.01 15.26 0 12 0zm0 5.84A6.16 6.16 0 1018.16 12 6.16 6.16 0 0012 5.84zM12 16a4 4 0 114-4 4 4 0 01-4 4zm6.41-11.85a1.44 1.44 0 100 2.88 1.44 1.44 0 000-2.88z"/></svg></div>
        <div class="type">Instagram</div>

    </div>

    <!-- Newsletter -->
    <div class="post p5">
      <div class="head">
        <div class="logo"><svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5-8-5V6l8 5 8-5z"/></svg></div>
        <div class="type">Newsletter</div>

    <!-- Facebook -->
    <div class="post p6">
      <div class="head">
        <div class="logo"><svg viewBox="0 0 24 24"><path d="M24 12a12 12 0 10-13.87 11.85v-8.38H7.08V12h3.05V9.36c0-3 1.79-4.67 4.53-4.67a18.5 18.5 0 012.69.23v2.95h-1.51c-1.49 0-1.96.93-1.96 1.88V12h3.33l-.53 3.47h-2.8v8.38A12 12 0 0024 12z"/></svg></div>
        <div class="type">Facebook</div>

    </div>
  </div>
</div>
</body>
</html>
