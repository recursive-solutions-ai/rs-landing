<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucy · 03 Lead Capture</title>
<style>
:root{
  --teal:#00d3bb;
  --teal-soft:rgba(0,211,187,.35);
  --teal-glow:rgba(0,211,187,.18);
  --indigo:#605dff;
  --indigo-soft:rgba(96,93,255,.35);
  --indigo-glow:rgba(96,93,255,.18);
  --bg:#0a0b14;
  --ink:#eaeaf2;
  --dim:#8a8ba0;
  --line:rgba(255,255,255,.07);
  --line2:rgba(255,255,255,.13);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:'SF Pro Display','Inter',system-ui,sans-serif;overflow:hidden}
body{
  background:
    radial-gradient(60% 50% at 20% 30%, var(--teal-glow), transparent 60%),
    radial-gradient(40% 40% at 80% 20%, var(--indigo-glow), transparent 60%),
    radial-gradient(50% 50% at 70% 90%, rgba(96,93,255,.10), transparent 60%),
    var(--bg);
  display:grid;place-items:center;
}
.stage{
  position:relative;
  width:min(1100px,96vw);
  aspect-ratio:16/10;
  border-radius:20px;
  overflow:hidden;
  background:linear-gradient(180deg,#0e0f1c,#08090f);
  box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 0 0 1px var(--line);
}
.grain{position:absolute;inset:0;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");}
.glow{position:absolute;inset:-20%;pointer-events:none;background:
  radial-gradient(40% 35% at 15% 30%, var(--teal-glow), transparent 60%),
  radial-gradient(35% 35% at 85% 25%, var(--indigo-glow), transparent 60%);
  filter:blur(20px);animation:drift 12s ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(2%,-2%)}}

.canvas{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 8%}

.form{position:relative;width:280px;border:1px solid var(--line2);border-radius:16px;background:rgba(20,21,32,.7);backdrop-filter:blur(20px);padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.form .ttl{font-family:'Fraunces',serif;font-size:16px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.form .ttl::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}
.input-line{height:32px;border:1px solid var(--line);border-radius:8px;background:rgba(0,0,0,.3);padding:8px 12px;font-size:11px;color:var(--dim);margin-bottom:8px;display:flex;align-items:center;position:relative;overflow:hidden}
.input-line.fill::after{content:"";position:absolute;left:12px;top:50%;height:1px;width:0;background:var(--teal);box-shadow:0 0 6px var(--teal);animation:fillLine 7s infinite}
.input-line.f1::after{animation-delay:.5s}
.input-line.f2::after{animation-delay:1.2s}
.input-line.f3::after{animation-delay:1.9s}
@keyframes fillLine{0%{width:0;opacity:0}5%{opacity:1}25%{width:80%;opacity:1}30%,100%{width:80%;opacity:0}}

.submit-btn{margin-top:8px;padding:10px;background:var(--teal);color:#062821;border:none;border-radius:8px;font-size:11px;font-weight:600;width:100%;animation:btnPress 7s infinite}
@keyframes btnPress{0%,38%{transform:scale(1);box-shadow:0 0 0 var(--teal-glow)}40%{transform:scale(.95);box-shadow:0 0 30px var(--teal-glow)}45%,100%{transform:scale(1)}}

.wire{position:absolute;left:35%;top:50%;width:30%;height:2px;background:linear-gradient(90deg,var(--teal-soft),var(--teal),var(--indigo-soft));opacity:0;animation:wireOn 7s infinite}
@keyframes wireOn{0%,42%{opacity:0}45%,80%{opacity:.5}85%,100%{opacity:0}}

.packet{position:absolute;left:35%;top:50%;transform:translateY(-50%);width:60px;padding:8px 10px;border-radius:8px;background:rgba(0,211,187,.15);border:1px solid var(--teal);box-shadow:0 0 24px var(--teal-glow);opacity:0;font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:1px;text-align:center;animation:flyPacket 7s infinite}
@keyframes flyPacket{
  0%,42%{opacity:0;left:35%;transform:translateY(-50%) scale(.5)}
  45%{opacity:1;transform:translateY(-50%) scale(1)}
  70%{opacity:1;left:62%;transform:translateY(-50%) scale(1)}
  78%{opacity:0;left:65%;transform:translateY(-50%) scale(.5)}
  100%{opacity:0}
}

.inbox{width:300px;display:flex;flex-direction:column;gap:8px;position:relative}
.inbox .h{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.inbox .h .ct{color:var(--teal);font-family:'JetBrains Mono',monospace}
.mail{border:1px solid var(--line);border-radius:10px;background:rgba(20,21,32,.6);backdrop-filter:blur(20px);padding:10px 12px;font-size:11px;opacity:.4}
.mail.new{opacity:0;animation:mailIn 7s infinite}
.mail.m1{animation-delay:0s}
.mail.m2{animation-delay:.3s}
@keyframes mailIn{0%,72%{opacity:0;transform:translateY(-6px)}77%,92%{opacity:1;transform:translateY(0);border-color:var(--teal-soft);box-shadow:0 0 20px var(--teal-glow)}96%,100%{opacity:1;border-color:var(--line);box-shadow:none}}
.mail .from{color:var(--teal);font-size:10px;text-transform:uppercase;letter-spacing:1.2px;display:flex;justify-content:space-between;margin-bottom:3px}
.mail .from .t{color:var(--dim);font-family:'JetBrains Mono',monospace;text-transform:none;letter-spacing:0}
.mail .s{font-family:'Fraunces',serif;font-size:12px;margin-bottom:2px}
.mail .p{color:var(--dim);font-size:10px;line-height:1.4}

.stage-marker{position:absolute;top:24px;left:30px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:2.5px;z-index:60}
.stage-marker b{color:var(--teal);font-weight:500}
.marker{position:absolute;top:24px;right:30px;font-family:'Fraunces',serif;font-size:11px;color:var(--teal);letter-spacing:1px;z-index:55;text-transform:uppercase}
</style>
</head>
<body>
<div class="stage">
  <div class="glow"></div>
  <div class="grain"></div>
  <div class="stage-marker">Lucy <b>·</b> 03</div>
  <span class="marker">03 / lead capture</span>

  <div class="canvas">
    <div class="form">
      <div class="ttl">Free Growth Audit</div>
      <div class="input-line fill f1"></div>
      <div class="input-line fill f2"></div>
      <div class="input-line fill f3"></div>
      <button class="submit-btn">Request my audit →</button>
    </div>

    <div class="wire"></div>
    <div class="packet">→ lead</div>

    <div class="inbox">
      <div class="h"><span>Inbox</span><span class="ct">●●● live</span></div>
      <div class="mail new m1">
        <div class="from">New lead <span class="t">just now</span></div>
        <div class="s">Jamie Reyes — Apex Partners</div>
        <div class="p">"Lead response time is killing us"</div>
      </div>
      <div class="mail new m2">
        <div class="from">Auto-reply <span class="t">12s</span></div>
        <div class="s">We got your request</div>
        <div class="p">Confirmation sent to submitter</div>
      </div>
      <div class="mail">
        <div class="from" style="color:var(--dim)">Earlier <span class="t">2h</span></div>
        <div class="s">Sara Holt — Holt CPA</div>
        <div class="p">"Looking for tax prep automation…"</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
