<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucy · 04 Pipeline</title>
<style>
:root{
  --teal:#00d3bb;
  --teal-soft:rgba(0,211,187,.35);
  --teal-glow:rgba(0,211,187,.18);
  --indigo:#605dff;
  --indigo-soft:rgba(96,93,255,.35);
  --indigo-glow:rgba(96,93,255,.18);
  --bg:#0a0b14;
  --ink:#eaeaf2;
  --dim:#8a8ba0;
  --line:rgba(255,255,255,.07);
  --line2:rgba(255,255,255,.13);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:'SF Pro Display','Inter',system-ui,sans-serif;overflow:hidden}
body{
  background:
    radial-gradient(60% 50% at 20% 30%, var(--teal-glow), transparent 60%),
    radial-gradient(40% 40% at 80% 20%, var(--indigo-glow), transparent 60%),
    radial-gradient(50% 50% at 70% 90%, rgba(96,93,255,.10), transparent 60%),
    var(--bg);
  display:grid;place-items:center;padding:2vw;
}
.stage{
  position:relative;
  width:100%;
  max-width:1100px;
  aspect-ratio:16/10;
  border-radius:clamp(10px,1.5vw,20px);
  overflow:hidden;
  background:linear-gradient(180deg,#0e0f1c,#08090f);
  box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 0 0 1px var(--line);
  container-type:inline-size;
}
.grain{position:absolute;inset:0;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");}
.glow{position:absolute;inset:-20%;pointer-events:none;background:
  radial-gradient(40% 35% at 15% 30%, var(--teal-glow), transparent 60%),
  radial-gradient(35% 35% at 85% 25%, var(--indigo-glow), transparent 60%);
  filter:blur(20px);animation:drift 12s ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(2%,-2%)}}

.canvas{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 6cqw}

/* ambient particles */
.particle{position:absolute;width:.35cqw;height:.35cqw;border-radius:50%;
  background:var(--teal);opacity:.4;box-shadow:0 0 .7cqw var(--teal)}
.particle.f1{top:18%;left:20%;animation:float 6s ease-in-out infinite}
.particle.f2{top:80%;left:30%;animation:float 7s ease-in-out infinite reverse;animation-delay:1s}
.particle.f3{top:25%;left:78%;animation:float 8s ease-in-out infinite;animation-delay:2s;background:var(--indigo);box-shadow:0 0 .7cqw var(--indigo)}
.particle.f4{top:75%;left:82%;animation:float 5.5s ease-in-out infinite reverse;animation-delay:.5s;background:var(--indigo);box-shadow:0 0 .7cqw var(--indigo)}
@keyframes float{
  0%,100%{transform:translate(0,0);opacity:.3}
  50%{transform:translate(1cqw,-1.5cqw);opacity:.7}
}

/* track */
.track{position:relative;display:flex;justify-content:space-between;align-items:center;margin-bottom:8cqw}

.stage-node{position:relative;z-index:2;width:14cqw;text-align:center}
.stage-node .circle{width:6cqw;height:6cqw;margin:0 auto 1.2cqw;border-radius:50%;
  border:1px solid var(--line2);background:rgba(20,21,32,.85);
  display:grid;place-items:center;font-size:2.6cqw;
  position:relative;transition:all .4s}
.stage-node .circle::before{content:"";position:absolute;inset:-.5cqw;border-radius:50%;
  border:1px solid var(--teal-soft);opacity:0;animation:nodeRing 7s infinite}
.stage-node.n1 .circle::before{animation-delay:.5s}
.stage-node.n2 .circle::before{animation-delay:2s}
.stage-node.n3 .circle::before{animation-delay:3.5s}
.stage-node.n4 .circle::before{animation-delay:5s}
@keyframes nodeRing{0%,3%{opacity:0;transform:scale(.8)}5%,15%{opacity:.8;transform:scale(1)}20%{opacity:0;transform:scale(1.3)}25%,100%{opacity:0}}

.stage-node.n1 .circle{animation:nodeOn 7s infinite;animation-delay:.5s}
.stage-node.n2 .circle{animation:nodeOn 7s infinite;animation-delay:2s}
.stage-node.n3 .circle{animation:nodeOn 7s infinite;animation-delay:3.5s}
.stage-node.n4 .circle{animation:nodeOn 7s infinite;animation-delay:5s}
@keyframes nodeOn{
  0%,3%{border-color:var(--line2);background:rgba(20,21,32,.85);box-shadow:none;filter:grayscale(.5);opacity:.7}
  5%,18%{border-color:var(--teal);background:rgba(0,211,187,.12);box-shadow:0 0 3cqw var(--teal-glow);filter:grayscale(0);opacity:1;transform:scale(1.08)}
  25%,100%{border-color:var(--teal-soft);background:rgba(20,21,32,.85);box-shadow:none;filter:grayscale(0);opacity:1;transform:scale(1)}
}

.stage-node .lbl{font-family:'Fraunces',serif;font-size:1.7cqw;font-weight:500;color:var(--ink);letter-spacing:-.2px}
.stage-node .sub{font-size:1.1cqw;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-top:.4cqw;letter-spacing:1px}

/* rail */
.rail{position:absolute;left:7cqw;right:7cqw;top:3cqw;height:1px;background:var(--line2);z-index:1}
.rail::after{content:"";position:absolute;left:0;top:-1.5px;height:4px;width:0;
  background:linear-gradient(90deg,var(--teal),var(--indigo));
  box-shadow:0 0 1.2cqw var(--teal);border-radius:3px;
  animation:railFill 7s infinite}
@keyframes railFill{
  0%{width:0}
  10%{width:33%}
  30%{width:33%}
  40%{width:66%}
  60%{width:66%}
  70%{width:100%}
  100%{width:100%}
}

/* traveling spark along the rail */
.rail-spark{position:absolute;top:50%;width:1.4cqw;height:1.4cqw;border-radius:50%;
  background:radial-gradient(circle,var(--teal),transparent 70%);
  box-shadow:0 0 1.5cqw var(--teal);
  transform:translate(-50%,-50%);
  animation:railSpark 7s infinite;opacity:0;z-index:3}
@keyframes railSpark{
  0%{left:0;opacity:0}
  5%{opacity:1}
  10%{left:33%}
  30%{left:33%;opacity:1}
  40%{left:66%}
  60%{left:66%;opacity:1}
  70%{left:100%}
  75%{opacity:0}
  100%{left:100%;opacity:0}
}

/* lead chips */
.leads{display:flex;justify-content:center;gap:2cqw;flex-wrap:wrap;max-width:80cqw;margin:0 auto}
.leadchip{padding:1.2cqw 1.8cqw;border-radius:99cqw;
  border:1px solid var(--line);background:rgba(20,21,32,.7);
  font-size:1.5cqw;display:flex;align-items:center;gap:1.2cqw;
  backdrop-filter:blur(10px)}
.leadchip .av{width:2.8cqw;height:2.8cqw;border-radius:50%;
  background:linear-gradient(135deg,rgba(0,211,187,.3),rgba(96,93,255,.15));
  display:grid;place-items:center;font-size:1.6cqw;
  border:1px solid var(--teal-soft)}
.leadchip .nm{font-family:'Fraunces',serif;font-weight:500;letter-spacing:-.2px}
.leadchip .st{font-size:1cqw;color:var(--dim);text-transform:uppercase;
  letter-spacing:1.5px;margin-left:.4cqw;font-family:'JetBrains Mono',monospace}

.leadchip.active{animation:chipActive 7s infinite}
.leadchip.l1{animation-delay:.5s}
.leadchip.l2{animation-delay:1.8s}
.leadchip.l3{animation-delay:3.2s}
@keyframes chipActive{
  0%,3%{border-color:var(--line);background:rgba(20,21,32,.7);box-shadow:none;transform:scale(1)}
  5%,18%{border-color:var(--teal);background:rgba(0,211,187,.12);box-shadow:0 0 2cqw var(--teal-glow);transform:scale(1.08) translateY(-.5cqw)}
  25%,100%{border-color:var(--line2);background:rgba(20,21,32,.7);box-shadow:none;transform:scale(1) translateY(0)}
}

.stage-marker{position:absolute;top:2.4cqw;left:3cqw;
  font-family:'JetBrains Mono',monospace;font-size:1.1cqw;color:var(--dim);
  text-transform:uppercase;letter-spacing:2.5px;z-index:60}
.stage-marker b{color:var(--teal);font-weight:500}
.marker{position:absolute;top:2.4cqw;right:3cqw;font-family:'Fraunces',serif;
  font-size:1.3cqw;color:var(--teal);letter-spacing:1px;z-index:55;text-transform:uppercase}
</style>
</head>
<body>
<div class="stage">
  <div class="glow"></div>
  <div class="grain"></div>
  <div class="stage-marker">Lucy <b>·</b> 04</div>
  <span class="marker">04 / pipeline</span>

  <div class="canvas">
    <div class="particle f1"></div>
    <div class="particle f2"></div>
    <div class="particle f3"></div>
    <div class="particle f4"></div>

    <div class="track">
      <div class="rail"></div>
      <span class="rail-spark"></span>

      <div class="stage-node n1">
        <div class="circle">✨</div>
        <div class="lbl">New</div>
        <div class="sub">4 leads</div>
      </div>
      <div class="stage-node n2">
        <div class="circle">📨</div>
        <div class="lbl">Contacted</div>
        <div class="sub">3 leads</div>
      </div>
      <div class="stage-node n3">
        <div class="circle">📞</div>
        <div class="lbl">Qualified</div>
        <div class="sub">3 leads</div>
      </div>
      <div class="stage-node n4">
        <div class="circle">🎉</div>
        <div class="lbl">Won</div>
        <div class="sub">2 closed</div>
      </div>
    </div>

    <div class="leads">
      <div class="leadchip active l1">
        <span class="av">👤</span>
        <span class="nm">Jamie Reyes</span>
        <span class="st">→ contacted</span>
      </div>
      <div class="leadchip active l2">
        <span class="av">👤</span>
        <span class="nm">Marcus Kim</span>
        <span class="st">→ qualified</span>
      </div>
      <div class="leadchip active l3">
        <span class="av">👤</span>
        <span class="nm">Talia Ng</span>
        <span class="st">→ won</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
